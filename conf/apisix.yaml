# APISIX declarative config for local development
# Frontend: http://localhost:5173
# Backend API: http://localhost:8000

apisix:
  node_listen: 9080
  allow_admin: true
  enable_admin_cors: true

deployment:
  role: traditional
  role_traditional:
    config_provider: yaml
  admin:
    admin_key:
      - name: admin
        key: "change-this-admin-key"
        role: admin

routes:
  - uri: /api/*
    name: backend-api
    priority: 100
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
      - HEAD
    plugins:
      proxy-rewrite:
        regex_uri:
          - "^/api/(.*)$"
          - "/api/$1"
      cors:
        allow_origins: "http://localhost:5173"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "*"
        expose_headers: "*"
        allow_credential: true
        max_age: 3600
    upstream:
      type: roundrobin
      pass_host: pass
      nodes:
        "127.0.0.1:8000": 1

  - uri: /*
    name: frontend-vite
    priority: 1
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
      - HEAD
    plugins:
      proxy-rewrite:
        uri: /
    upstream:
      type: roundrobin
      pass_host: pass
      nodes:
        "127.0.0.1:5173": 1
      timeout:
        connect: 6
        send: 6
        read: 6
    websocket: true
