services:
  apisix:
    image: apache/apisix:3.8.0-debian
    container_name: apisix
    ports:
      - "9080:9080"
      - "9180:9180"
    volumes:
      - ./conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    depends_on:
      - frontend
      - auth_service

  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run serve"
    environment:
      VITE_API_GATEWAY_URL: http://localhost:9080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  auth_service:
    build:
      context: ./services/auth-prueba
    container_name: auth_service
    restart: always
    env_file:
      - ./services/auth-prueba/.env
    environment:
      DB_HOST: auth_db
      DB_PORT: 5432
      KAFKA_BROKER: kafka:9092
    volumes:
      - ./services/auth-prueba:/app
    ports:
      - "8000:8000"
    depends_on:
      - auth_db
      - kafka

  auth_db:
    image: postgres:16
    container_name: auth_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5440:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./services/auth-prueba/docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  kafka:
    image: redpandadata/redpanda:latest
    container_name: kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"

  auth_worker:
    build:
      context: ./services/auth-prueba
    container_name: auth_worker
    restart: always
    env_file:
      - ./services/auth-prueba/.env
    environment:
      DB_HOST: auth_db
      DB_PORT: 5432
      KAFKA_BROKER: kafka:9092
    volumes:
      - ./services/auth-prueba:/app
    command: ["python", "manage.py", "publish_events"]
    depends_on:
      - auth_db
      - kafka

  auth_consumer:
    build:
      context: ./services/auth-prueba
    container_name: auth_consumer
    restart: always
    env_file:
      - ./services/auth-prueba/.env
    environment:
      DB_HOST: auth_db
      DB_PORT: 5432
      KAFKA_BROKER: kafka:9092
    volumes:
      - ./services/auth-prueba:/app
    command: ["python", "manage.py", "consume_events"]
    depends_on:
      - auth_db
      - kafka

  alojamientos_service:
    build:
      context: ./services/alojamientos
    container_name: alojamientos_service
    restart: always
    environment:
      APP_DATASOURCE_WRITE_URL: jdbc:postgresql://alojamientos_db:5432/alojamientos_write_db
      APP_DATASOURCE_READ_URL: jdbc:postgresql://alojamientos_db:5432/alojamientos_read_db
      APP_DATASOURCE_WRITE_PASSWORD: postgres
      APP_DATASOURCE_READ_PASSWORD: postgres
    ports:
      - "8081:8081"
    depends_on:
      - alojamientos_db

  alojamientos_db:
    image: postgres:16
    container_name: alojamientos_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5441:5432"
    volumes:
      - alojamientos_db_data:/var/lib/postgresql/data
      - ./services/alojamientos/docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro



volumes:
  auth_db_data:
  frontend_node_modules:
  alojamientos_db_data:
